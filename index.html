<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meine Webseite</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --card: #1a1814;
      --accent: #c9a84c;
      --accent2: #e8c97a;
      --text: #f0ebe0;
      --muted: #8a8070;
      --border: rgba(201, 168, 76, 0.2);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Hintergrund-Textur */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 30%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(139,110,50,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 900px;
      width: 90%;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.05);
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FOTO-SEITE ── */
    .photo-side {
      position: relative;
      min-height: 520px;
      overflow: hidden;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.85) brightness(0.9);
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.8s ease;
    }

    .photo-side:hover img {
      transform: scale(1.04);
      filter: saturate(1) brightness(1);
    }

    /* Goldener Overlay-Streifen */
    .photo-side::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 50%, rgba(201,168,76,0.12) 100%);
      pointer-events: none;
    }

    .photo-label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    /* ── TEXT-SEITE ── */
    .content-side {
      background: var(--card);
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      border-left: 1px solid var(--border);
      animation: fadeUp 0.9s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      line-height: 1.15;
      font-weight: 700;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent2);
    }

    p {
      font-size: 0.95rem;
      line-height: 1.75;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 30px;
      background: var(--accent);
      color: #0e0d0b;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
      align-self: flex-start;
      text-decoration: none;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before { left: 100%; }
    .btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(201,168,76,0.3);
    }
    .btn:active { transform: translateY(0); }

    .btn svg { width: 16px; height: 16px; }

    /* Trennlinie */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
      .photo-side { min-height: 280px; }
      .content-side { padding: 36px 28px; border-left: none; border-top: 1px solid var(--border); }
      h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- FOTO -->
  <div class="photo-side">
    <img
      src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80"
      alt="Berglandschaft bei Sonnenaufgang"
    />
    <span class="photo-label">Bergwelt &amp; Natur</span>
  </div>

  <!-- INHALT -->
  <div class="content-side">
    <span class="eyebrow">Willkommen</span>

    <h1>Entdecke <em>neue</em> Horizonte</h1>

    <div class="divider"></div>

    <p>
      Die Welt hält unzählige Momente bereit, die darauf warten, erlebt zu werden.
      Jeder Schritt führt zu einer neuen Geschichte, einem neuen Blickwinkel.
    </p>

    <button class="btn" onclick="alert('Du hast den Button geklickt! 🎉')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Mehr entdecken
    </button>
  </div>

</div>

</body>
</html>
